version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: ecg_postgres
    environment:
      POSTGRES_DB: ecg_digital_city
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecg_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ecg_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecg_network

  # Backend Server
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.dev
    container_name: ecg_backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecg_digital_city
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ecg-dev-secret-key-change-in-prod
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
    networks:
      - ecg_network
    command: npm run dev

  # Frontend Server
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.dev
    container_name: ecg_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://localhost:3000
      VITE_SOCKET_URL: ws://localhost:3000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/tests:/app/tests
    networks:
      - ecg_network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  ecg_network:
    driver: bridge
