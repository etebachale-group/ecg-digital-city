<!DOCTYPE html>
<html>
<head>
    <title>Test ECG Digital City Endpoints</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        .endpoint {
            background: #16213e;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #0f3460;
        }
        .endpoint.success {
            border-left-color: #10b981;
        }
        .endpoint.error {
            border-left-color: #ef4444;
        }
        .endpoint h3 {
            margin: 0 0 10px 0;
            color: #f39c12;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            margin-right: 10px;
        }
        .status.ok {
            background: #10b981;
            color: white;
        }
        .status.error {
            background: #ef4444;
            color: white;
        }
        pre {
            background: #0f0f23;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
        button {
            background: #f39c12;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover {
            background: #e67e22;
        }
        #loading {
            text-align: center;
            padding: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>🔍 ECG Digital City - Test de Endpoints</h1>
    <p>Verificando estado de todos los endpoints...</p>
    
    <button onclick="testAll()">🔄 Probar Todos</button>
    <button onclick="location.reload()">♻️ Recargar Página</button>
    
    <div id="loading">⏳ Cargando...</div>
    <div id="results"></div>

    <script>
        const BASE_URL = 'https://ecg-digital-city.onrender.com';
        
        const endpoints = [
            { name: 'Health Check', url: '/health', method: 'GET' },
            { name: 'API Root', url: '/api', method: 'GET' },
            { name: 'Districts', url: '/api/districts', method: 'GET' },
            { name: 'Achievements', url: '/api/achievements', method: 'GET' },
            { name: 'Missions', url: '/api/missions', method: 'GET' },
        ];

        async function testEndpoint(endpoint) {
            const startTime = Date.now();
            try {
                const response = await fetch(BASE_URL + endpoint.url, {
                    method: endpoint.method,
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const duration = Date.now() - startTime;
                const data = await response.json();
                
                return {
                    ...endpoint,
                    status: response.status,
                    ok: response.ok,
                    duration,
                    data
                };
            } catch (error) {
                const duration = Date.now() - startTime;
                return {
                    ...endpoint,
                    status: 0,
                    ok: false,
                    duration,
                    error: error.message
                };
            }
        }

        async function testAll() {
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            
            loading.style.display = 'block';
            results.innerHTML = '';
            
            for (const endpoint of endpoints) {
                const result = await testEndpoint(endpoint);
                
                const div = document.createElement('div');
                div.className = `endpoint ${result.ok ? 'success' : 'error'}`;
                
                const statusClass = result.ok ? 'ok' : 'error';
                const statusText = result.ok ? 'OK' : 'ERROR';
                
                div.innerHTML = `
                    <h3>${result.name}</h3>
                    <div>
                        <span class="status ${statusClass}">${result.status} ${statusText}</span>
                        <span>⏱️ ${result.duration}ms</span>
                        <span>🔗 ${result.method} ${result.url}</span>
                    </div>
                    <pre>${JSON.stringify(result.data || result.error, null, 2)}</pre>
                `;
                
                results.appendChild(div);
            }
            
            loading.style.display = 'none';
        }

        // Auto-test on load
        window.onload = testAll;
    </script>
</body>
</html>
